name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff black

      - name: Compile reconstructed modules
        run: python -m compileall -q src

      - name: Ruff
        run: ruff check src

      - name: Black
        run: black --check src
